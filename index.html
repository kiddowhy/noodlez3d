<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NOODLEZ3D</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Helvetica, Arial, sans-serif;
    }

    body {
      background: #000;
      color: #fff;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    /* Top bar */
    .header {
      display: flex;
      justify-content: space-between;
      padding: 20px 30px;
      font-size: 12px;
      letter-spacing: 1px;
    }

    .logo {
      font-weight: bold;
      font-size: 18px;
    }

    .nav {
      display: flex;
      gap: 20px;
    }

    /* Center content */
    .center {
      text-align: center;
    }

    .brand {
      font-size: 48px;
      font-weight: bold;
      margin-bottom: 20px;
    }

    .subtext {
      font-size: 12px;
      opacity: 0.6;
      margin-bottom: 30px;
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 10px;
      font-size: 14px;
    }

    .links a {
      color: white;
      text-decoration: none;
      opacity: 0.8;
    }

    .links a:hover {
      opacity: 1;
    }

    /* Footer */
    .footer {
      text-align: center;
      padding: 20px;
      font-size: 12px;
      opacity: 0.5;
    }

  </style>
</head>

<body>

  <!-- Header -->
  <div class="header">
    <div class="logo">NOODLEZ3D</div>
    <div class="nav">
      <div>SHOP</div>
      <div>ARCHIVE</div>
      <div>CONTACT</div>
    </div>
  </div>

  <!-- Center -->
  <div class="center">
    <div class="brand">NOODLEZ3D</div>
    <div class="subtext">BENGALURU • INDIA</div>

    <div class="links">
      <a href="#">3d miniatures</a>
      <a href="#">custom prints</a>
      <a href="#">about</a>
      <a href="#">contact</a>
    </div>
  </div>

  <!-- Footer -->
  <div class="footer">
    instagram / whatsapp / email
  </div>

</body>
</html>
